{% extends "ui/base.html" %}

{% block content %}
<nav aria-label="Espace de gestion" class="manage-nav">
  <a href="{% url 'announcements:manage_list' %}">Annonces</a>
  <a href="{{ civic.AGENDA_URL }}/admin">Agenda (Gancio)</a>
  <form method="post" action="{% url 'logout' %}" class="inline-form">
    {% csrf_token %}
    <button type="submit" class="link-button">Se déconnecter</button>
  </form>
</nav>

{% if messages %}
  {% for message in messages %}
  <p class="banner-info" role="status">{{ message }}</p>
  {% endfor %}
{% endif %}

{% block manage_content %}{% endblock %}
{% endblock %}
