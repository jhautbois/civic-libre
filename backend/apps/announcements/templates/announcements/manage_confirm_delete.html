{% extends "announcements/manage_base.html" %}

{% block title %}Supprimer l'annonce – {{ civic.COMMUNE_NAME }}{% endblock %}

{% block manage_content %}
<h1>Supprimer l'annonce</h1>
<form method="post" class="card">
  {% csrf_token %}
  <p>Supprimer « {{ object.title }} » ? Cette action est définitive.</p>
  <button type="submit" class="btn btn-primary">Supprimer</button>
  <a class="btn btn-secondary" href="{% url 'announcements:manage_list' %}">Annuler</a>
</form>
{% endblock %}
