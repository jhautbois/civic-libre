{% extends "ui/base.html" %}

{% block content %}

  <a href="{% url 'announcements:manage_list' %}">Annonces</a>
  <a href="{{ civic.AGENDA_URL }}/admin">Agenda (Gancio)</a>

</nav>

{% block manage_content %}{% endblock %}
{% endblock %}
